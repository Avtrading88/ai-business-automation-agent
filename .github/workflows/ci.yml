name: CI - Tests and Quality Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest

      - name: Run CLI smoke test
        run: |
          python main.py --input data/input/sample_quickbooks_contacts_invoices.csv --skip-approval --approved-by "CI Bot" --approver-role reviewer

      - name: Check generated core outputs
        run: |
          test -f data/output/crm_ready_contacts.csv
          test -f data/output/report.txt
          test -f data/output/quickbooks_customers_ready.csv
          test -f data/output/automation_audit_log.csv

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t business-automation-agent:ci .
