[tool.black]
line-length = 100
target-version = ["py311", "py312"]
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E402", "E501", "UP017", "UP035", "UP037"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
